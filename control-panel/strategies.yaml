# Map UI strategies to systemd user units. Clone repo to a path WITHOUT spaces (e.g. ~/kalshi-trading).
# Install units under ~/.config/systemd/user/ then: systemctl --user daemon-reload
#
# Used when "restart control panel after pull" is enabled in the Deploy tab.
control_panel_unit: kalshi-control-panel.service

# Optional per strategy: kalshi_env_file (relative to repo) for Paper/Live detection. Default .env
strategies:
  # Cumulative P&L: settlement ledger when synced (Kalshi truth); else trade_outcomes in trades.db.
  - id: btc15m
    title: "BTC 15m bot"
    systemd_unit: kalshi-btc15m.service
    data:
      type: mixed
      journal_lines: 300
      sqlite:
        path: btc15m_data/trades.db
        tables:
          - btc_sessions
          - btc_order_events
          - trade_outcomes

  - id: weather
    title: "Weather bot"
    systemd_unit: kalshi-weather-bot.service
    data:
      type: sqlite
      path: weather-bot/db/trades.db
      tables:
        - forecasts
        - signals
        - trades
        - errors

  # Optional: settlement_prefixes (uppercase ok) — first strategy match wins.
  # Use to send weather tickers to vol_surface instead of the default weather bucket.
  - id: vol_surface
    title: "Vol surface (BTC hourly + weather)"
    systemd_unit: kalshi-vol-surface.service
    settlement_prefixes: []
    data:
      type: mixed
      journal_lines: 500
      sqlite:
        path: vol_surface_data/panel.db
        tables:
          - last_scan
          - order_events
          - trade_outcomes
