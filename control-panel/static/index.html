<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kalshi strategies</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --text:#e7ecf3; --muted:#8b9cb3; --accent:#3d8bfd; --ok:#3ecf8e; --bad:#f85149; --bar:#2d4a6f; }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; min-height: 100vh; }
    header { padding: 0.75rem 1.25rem; border-bottom: 1px solid #2d3a4f; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem 1rem; }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .nav-main { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .nav-main button { background: #2d3a4f; color: var(--text); border: none; padding: 0.4rem 0.85rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .nav-main button.on { background: var(--accent); color: #fff; }
    main { padding: 1rem 1.25rem; max-width: 90rem; margin: 0 auto; }
    .card { background: var(--card); border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1rem; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 0.75rem; margin-top: 0.6rem; }
    button { background: #2d3a4f; color: var(--text); border: none; padding: 0.45rem 0.85rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
    button:hover { background: #3d4d66; }
    button.primary { background: var(--accent); color: #fff; }
    .badge { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: #2d3a4f; }
    .badge.active { background: #1f4d3a; color: var(--ok); }
    .badge.inactive { background: #4d1f1f; color: var(--bad); }
    .badge.paper { background: #5c4d1f; color: #f5e6a6; }
    .badge.live { background: #1f3d2f; color: var(--ok); }
    .overview-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(14rem, 1fr)); margin-top: 0.75rem; }
    .overview-tile { background: #0b0f14; border-radius: 8px; padding: 0.75rem 0.85rem; }
    .overview-tile .big { font-size: 1.15rem; font-weight: 600; }
    .acct-stat { margin-top: 0.35rem; font-size: 0.9rem; }
    .db-ok { color: var(--ok); font-weight: 600; }
    .db-miss { color: var(--bad); font-weight: 600; }
    .db-path { font-size: 0.72rem; color: var(--muted); word-break: break-all; }
    .tabs { display: flex; gap: 0.35rem; flex-wrap: wrap; margin: 0.75rem 0 0.5rem; }
    .tabs button { opacity: 0.85; }
    .tabs button.on { opacity: 1; outline: 1px solid var(--accent); }
    .panel { display: none; }
    .panel.on { display: block; }
    pre, .table-wrap { background: #0b0f14; border-radius: 8px; padding: 0.75rem; overflow: auto; font-size: 0.78rem; max-height: min(70vh, 36rem); margin: 0.5rem 0 0; white-space: pre-wrap; word-break: break-word; }
    table { border-collapse: collapse; width: 100%; font-size: 0.78rem; }
    th, td { border-bottom: 1px solid #2d3a4f; padding: 0.35rem 0.5rem; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 500; position: sticky; top: 0; background: #0b0f14; }
    .hint { color: var(--muted); font-size: 0.8rem; margin-top: 0.75rem; }
    .chart-wrap { position: relative; background: #0b0f14; border-radius: 10px; padding: 1.25rem 0.75rem 0.5rem; margin-top: 0.75rem; overflow: hidden; }
    .chart-grid { position: absolute; inset: 0; pointer-events: none; }
    .chart-grid line { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
    .chart-grid text { fill: #4a5568; font-size: 9px; font-family: ui-sans-serif, system-ui, sans-serif; }
    .chart { display: flex; align-items: flex-end; gap: 3px; height: 190px; position: relative; z-index: 1; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; cursor: default; }
    .bar-col:hover .bar { filter: brightness(1.25); }
    .bar { width: 100%; max-width: 32px; border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.25s ease, filter 0.15s; }
    .bar-label { font-size: 0.6rem; color: var(--muted); margin-top: 5px; white-space: nowrap; }
    .bar-pct { font-size: 0.62rem; font-weight: 600; margin-top: 2px; }
    .bar-n { font-size: 0.58rem; color: #4a6a8a; margin-top: 1px; }
    .page { display: none; }
    .page.on { display: block; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.5rem 0; border-bottom: 1px solid #2d3a4f; }
    .toggle-row label { flex: 1; font-size: 0.875rem; }
    .toggle-row code { font-size: 0.75rem; color: var(--muted); }
    #deploy-out { min-height: 4rem; }
    .csv-dl-btn { font-size: 0.78rem; padding: 0.3rem 0.7rem; }
  </style>
</head>
<body>
  <header>
    <h1>Kalshi strategies</h1>
    <nav class="nav-main" id="nav-main"></nav>
  </header>
  <main id="main"></main>
  <p class="hint" style="padding:0 1.25rem 1rem">All times shown in Eastern Time (ET) · Overview refreshes every 60s · <code>/api/health</code></p>

<script>
async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  const t = r.headers.get('content-type') || '';
  return t.includes('json') ? r.json() : r.text();
}

function badge(st) {
  const on = (st || '').toLowerCase() === 'active';
  return '<span class="badge ' + (on ? 'active">running' : 'inactive">stopped') + '</span>';
}

let strategies = [];
let overviewTimer = null;

function modeBadgeHtml(mode, label) {
  const m = (mode === 'paper') ? 'paper' : 'live';
  const lbl = label || (m === 'paper' ? 'Paper' : 'Live');
  const cls = m === 'paper' ? 'badge paper' : 'badge live';
  const tip = 'Kalshi API environment from KALSHI_HOST in .env (demo = Paper, prod = Live). Not whether the bot process is running.';
  return '<span class="' + cls + '" title="' + tip + '">' + lbl + '</span>';
}

function fmtCents(c) {
  if (c == null || c === '' || (typeof c === 'number' && !isFinite(c))) return '—';
  const n = Number(c);
  const neg = n < 0;
  const a = Math.abs(n);
  return (neg ? '-$' : '$') + (a / 100).toFixed(2);
}

function pnlCaption(src) {
  if (src === 'realized_trades') return 'realized (DB)';
  if (src === 'approx_logged_mids') return 'per-session realized (DB)';
  if (src === 'kalshi_settlements_ledger') return 'Kalshi settlements (net of cost &amp; fees)';
  if (src === 'vol_surface_settlements') return 'resolved settlements (panel DB)';
  if (src === 'trade_outcomes') return 'resolved (trade_outcomes DB)';
  return 'logged';
}

function pnlLineHtml(s) {
  if (!s || !s.pnl_source) return '';
  return 'Cumulative P&amp;L (' + pnlCaption(s.pnl_source) + '): <strong>' + fmtCents(s.pnl_cents) + '</strong>';
}

function applyMetricsToCard(card, s) {
  if (!card || !s) return;
  const mb = card.querySelector('[data-role="mode-badge"]');
  if (mb) mb.innerHTML = modeBadgeHtml(s.trading_mode, s.trading_mode_label);
  const pl = card.querySelector('[data-role="pnl-line"]');
  if (pl) {
    const t = pnlLineHtml(s);
    pl.innerHTML = t || '&nbsp;';
  }
}

function renderSqliteDebug(sq) {
  if (!sq || !sq.strategies) return '<p class="hint">No SQLite strategies configured.</p>';
  let h = '<p class="hint" style="margin:0 0 0.5rem">Repo: <code>' + escapeHtml(sq.repo_root || '') + '</code></p>';
  for (const s of sq.strategies) {
    h += '<div class="overview-tile" style="margin-bottom:0.5rem">';
    h += '<strong>' + escapeHtml(s.strategy_id || '') + '</strong> ';
    if (s.error) {
      h += '<span class="db-miss">path error</span>';
      h += '<div class="hint">' + escapeHtml(s.error) + '</div>';
    } else if (s.exists) {
      h += '<span class="db-ok">exists</span>';
      const sz = s.size_bytes != null ? ' · ' + s.size_bytes + ' bytes' : '';
      h += '<span class="hint">' + sz + '</span>';
    } else {
      h += '<span class="db-miss">missing</span>';
      h += '<span class="hint"> (start the bot once to create the file)</span>';
    }
    h += '<div class="db-path">' + escapeHtml(s.absolute_path || '') + '</div>';
    if (s.sqlite_error) {
      h += '<div style="color:var(--bad);font-size:0.8rem;margin-top:0.25rem">' + escapeHtml(s.sqlite_error) + '</div>';
    }
    if (s.tables_in_file && s.tables_in_file.length) {
      h += '<div class="hint" style="margin-top:0.35rem">Tables: <code>' + s.tables_in_file.map(escapeHtml).join('</code>, <code>') + '</code></div>';
    } else if (s.exists && !s.sqlite_error) {
      h += '<div class="hint" style="margin-top:0.35rem">No tables found in file.</div>';
    }
    h += '</div>';
  }
  return h;
}

async function loadOverview(pageEl) {
  const root = pageEl.querySelector('[data-overview-root]');
  if (!root) return;
  const balEl = root.querySelector('[data-balance]');
  const pvEl = root.querySelector('[data-portfolio]');
  const errEl = root.querySelector('[data-bal-err]');
  const modeEl = root.querySelector('[data-acct-mode]');
  const gridEl = root.querySelector('[data-overview-strats]');
  const totalEl = root.querySelector('[data-total-pnl]');
  const hintEl = root.querySelector('[data-heartbeat-hint]');
  const sqliteEl = root.querySelector('[data-overview-sqlite]');
  try {
    const [j, sq] = await Promise.all([
      api('/api/overview'),
      api('/api/debug/sqlite').catch(function () { return null; }),
    ]);
    if (hintEl) {
      hintEl.textContent = 'Refreshes every ' + (j.heartbeat_interval_sec || 60) + 's while on this tab: balance API + SQLite file check (<code>KALSHI_TRADING_ROOT</code> / <code>strategies.yaml</code> paths).';
    }
    if (modeEl) modeEl.innerHTML = modeBadgeHtml(j.account_trading_mode, j.account_trading_mode_label);
    if (balEl) balEl.innerHTML = 'Available: <span class="big">' + fmtCents(j.balance_cents) + '</span>';
    if (pvEl) pvEl.textContent = 'Portfolio value: ' + fmtCents(j.portfolio_value_cents);
    if (errEl) {
      errEl.textContent = j.balance_error ? ('Balance API: ' + j.balance_error) : '';
      errEl.style.display = j.balance_error ? 'block' : 'none';
    }
    if (sqliteEl) {
      sqliteEl.innerHTML = sq ? renderSqliteDebug(sq) : '<p class="hint" style="color:var(--bad)">Could not load DB status.</p>';
    }
    if (totalEl) totalEl.innerHTML = '<span class="big">' + fmtCents(j.total_pnl_cents) + '</span> <span class="hint">(sum of per-bot logged metrics below)</span>';
    if (gridEl && j.strategies) {
      let h = '';
      for (const st of j.strategies) {
        h += '<div class="overview-tile"><strong>' + (st.title || st.id) + '</strong> ';
        h += modeBadgeHtml(st.trading_mode, st.trading_mode_label);
        h += '<div class="acct-stat">' + (pnlLineHtml(st) || 'No P&amp;L data') + '</div></div>';
      }
      gridEl.innerHTML = h;
    }
  } catch (e) {
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = String(e); }
    if (sqliteEl) sqliteEl.innerHTML = '<p class="hint" style="color:var(--bad)">' + escapeHtml(String(e)) + '</p>';
  }
}

function buildOverviewPage() {
  const div = document.createElement('div');
  div.className = 'page';
  div.dataset.page = 'overview';
  div.innerHTML =
    '<div class="card" data-overview-root>' +
    '<strong>Overview</strong>' +
    '<p class="hint" data-heartbeat-hint></p>' +
    '<div class="row" style="margin-top:0.5rem;align-items:center;gap:0.5rem">Account <span data-acct-mode></span></div>' +
    '<div data-balance class="acct-stat"></div>' +
    '<div data-portfolio class="acct-stat"></div>' +
    '<p class="hint" data-bal-err style="display:none;color:var(--bad)"></p>' +
    '<h3 style="font-size:0.95rem;margin:1rem 0 0.35rem;font-weight:600">Trade log databases</h3>' +
    '<p class="hint" style="margin:0 0 0.5rem">Whether each SQLite file exists on the server (same paths as the Bots → tables tabs).</p>' +
    '<div data-overview-sqlite>Loading…</div>' +
    '<h3 style="font-size:0.95rem;margin:1rem 0 0.35rem;font-weight:600">Bots</h3>' +
    '<div class="overview-grid" data-overview-strats></div>' +
    '<h3 style="font-size:0.95rem;margin:1rem 0 0.35rem;font-weight:600">Combined logged P&amp;L</h3>' +
    '<div data-total-pnl></div></div>';
  return div;
}

function barColor(pct, hasData) {
  if (!hasData) return '#1e2d3d';
  if (pct >= 65) return '#2ea87e';
  if (pct >= 45) return '#4a9edd';
  if (pct >= 25) return '#c98a2c';
  return '#a04040';
}

function renderBtcHourly(container, sid) {
  api('/api/strategies/' + sid + '/btc-hourly').then((j) => {
    const CHART_H = 190;
    const maxPct = Math.max(1, ...j.pct, 100);
    const gridPcts = [25, 50, 75, 100];

    // Build SVG grid overlay
    let svgLines = '';
    for (const gp of gridPcts) {
      const y = Math.round(CHART_H - (gp / maxPct) * (CHART_H - 10)) + 20;
      svgLines += '<line x1="0" y1="' + y + '" x2="100%" y2="' + y + '"/>';
      svgLines += '<text x="4" y="' + (y - 3) + '">' + gp + '%</text>';
    }

    let h = '<p class="hint" style="margin-bottom:0.5rem">Success rate (filled trades only). Bars: <span style="color:#2ea87e">≥65%</span> · <span style="color:#4a9edd">≥45%</span> · <span style="color:#c98a2c">≥25%</span> · <span style="color:#a04040">&lt;25%</span>. Hour = <strong>ET</strong>. n = trades with fills.</p>';
    h += '<div class="chart-wrap">';
    h += '<svg class="chart-grid" width="100%" height="100%">' + svgLines + '</svg>';
    h += '<div class="chart">';
    for (let i = 0; i < 24; i++) {
      const pct = j.pct[i];
      const n = j.count[i];
      const hasData = n > 0;
      const hpx = hasData ? Math.max(3, Math.round((pct / maxPct) * (CHART_H - 10))) : 3;
      const lbl = utcHourToEstLabel(i);
      const color = barColor(pct, hasData);
      const opacity = hasData ? '' : 'opacity:0.3;';
      h += '<div class="bar-col" style="' + opacity + '" title="' + lbl + ': ' + (hasData ? pct + '% (n=' + n + ')' : 'no data') + '">';
      h += '<div class="bar" style="height:' + hpx + 'px;background:' + color + ';box-shadow:0 0 8px ' + color + '44"></div>';
      h += '<span class="bar-label">' + lbl + '</span>';
      h += '<span class="bar-pct" style="color:' + (hasData ? color : '#4a5568') + '">' + (hasData ? pct + '%' : '—') + '</span>';
      h += '<span class="bar-n">' + (hasData ? 'n=' + n : '') + '</span>';
      h += '</div>';
    }
    h += '</div></div>';
    container.innerHTML = h;
  }).catch((e) => { container.innerHTML = '<pre>' + String(e) + '</pre>'; });
}

function loadLog(el, sid, lines) {
  api('/api/strategies/' + sid + '/logs?lines=' + (lines || 400)).then((j) => {
    el.textContent = j.log || '(empty)';
  }).catch((e) => { el.textContent = String(e); });
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function utcToEst(s) {
  if (!s || typeof s !== 'string') return s;
  try {
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleString('en-US', { timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(',', '');
  } catch (_) { return s; }
}

function isUtcTimestamp(col, val) {
  if (typeof val !== 'string') return false;
  const cl = (col || '').toLowerCase();
  if (cl.includes('utc') || cl.includes('_at') || cl.includes('time') || cl.includes('timestamp') || cl === 'generated_at' || cl === 'created_at' || cl === 'updated_at') {
    return /\d{4}-\d{2}-\d{2}T/.test(val) || /\d{4}-\d{2}-\d{2} \d{2}:/.test(val);
  }
  return false;
}

function formatCell(col, val) {
  if (val === null || val === undefined) return '';
  const s = String(val);
  if (isUtcTimestamp(col, s)) return utcToEst(s);
  return s;
}

function utcHourToEstLabel(h) {
  var now = new Date();
  var d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, 0, 0));
  var est = d.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', hour12: true });
  return est.replace(':00 ', '').replace(' ', '');
}

function downloadCsv(columns, rows, filename) {
  var lines = [columns.map(function (c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',')];
  for (var i = 0; i < rows.length; i++) {
    lines.push(rows[i].map(function (v) {
      if (v === null || v === undefined) return '';
      return '"' + String(v).replace(/"/g, '""') + '"';
    }).join(','));
  }
  var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (filename || 'data') + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function volSurfaceOrderStatusLabel(os) {
  if (os === 'open') return 'Open order';
  if (os === 'active_position') return 'Active position';
  return 'None';
}

function loadVolSurfaceDashboard(el, sid) {
  if (!el) return;
  el.innerHTML = 'Loading…';
  api('/api/strategies/' + sid + '/vol-surface-dashboard').then((j) => {
    if (j.error) {
      el.innerHTML = '<pre class="hint">' + escapeHtml(j.error) + '</pre>';
      return;
    }
    let h = '';
    if (j.generated_at_utc) {
      h += '<p class="hint">Snapshot: ' + escapeHtml(utcToEst(j.generated_at_utc)) + ' ET</p>';
    }
    const pnl = j.pnl_by_market_type || {};
    h += '<div class="overview-grid" style="margin:0.75rem 0">';
    h += '<div class="overview-tile"><div class="hint">Cumulative realized</div><div class="big">' + fmtCents(j.cumulative_pnl_cents) + '</div></div>';
    h += '<div class="overview-tile"><div class="hint">BTC hourly</div><div class="big">' + fmtCents(pnl.btc_hourly) + '</div></div>';
    h += '<div class="overview-tile"><div class="hint">Weather HIGH</div><div class="big">' + fmtCents(pnl.weather_high) + '</div></div>';
    h += '<div class="overview-tile"><div class="hint">Weather LOW</div><div class="big">' + fmtCents(pnl.weather_low) + '</div></div>';
    h += '</div>';
    if (j.pnl_source === 'kalshi_settlement_ledger') {
      h += '<p class="hint" style="margin:0.5rem 0">Tile totals use the <strong>Kalshi settlement ledger</strong> (net P&amp;L: payout minus YES/NO cost basis and fees). <code>trade_outcomes</code> in panel.db is separate bot tracking.</p>';
    } else {
      h += '<p class="hint" style="margin:0.5rem 0">Realized P&amp;L from <code>trade_outcomes</code> when the bot records settlements. Open positions show as &quot;open&quot; until resolved.</p>';
    }
    h += '<h3 style="font-size:0.95rem;margin:0.75rem 0 0.35rem">All markets</h3>';
    h += '<p class="hint" style="margin:0 0 0.5rem">Window = strategy trading hours. <strong>5m tick</strong> = this minute is an evaluation tick (:00,:05,…; BTC uses UTC). Last scan updates when the bot runs a full calc for that key. Order: <em>None</em> (no resting order / flat), <em>Open order</em> (limit working), <em>Active position</em> (filled / holding).</p>';
    const mktList = j.markets && j.markets.length ? j.markets : (j.tracker_rows || []);
    h += '<div class="table-wrap"><table style="font-size:0.82rem"><thead><tr>';
    h += '<th>Market</th><th>Window</th><th>In window</th><th>5m tick</th><th>Last scan (ET)</th><th>Order</th><th>Tracker</th>';
    h += '</tr></thead><tbody>';
    for (const m of mktList) {
      const w = m.window || {};
      const sc = m.last_scan || {};
      const label = escapeHtml(m.label || m.key || '');
      const inW = w.in_trading_window ? '<span style="color:var(--ok)">Yes</span>' : '<span style="color:var(--muted)">No</span>';
      const tick = (w.monitor_tick === true) ? '<span style="color:var(--ok)">Yes</span>' : '<span style="color:var(--muted)">No</span>';
      let winCol = '';
      if ((w.kind || '') === 'btc_hourly') {
        winCol = escapeHtml((w.window_hint || '') + (w.next_window_hint ? ' ' + w.next_window_hint : ''));
      } else {
        winCol = escapeHtml((w.local_window || '') + ' ' + (w.timezone || ''));
      }
      let scanCol = '—';
      if (sc.updated_utc) {
        scanCol = escapeHtml(utcToEst(sc.updated_utc));
        if (sc.trade_recommended) {
          scanCol += ' <span style="color:var(--ok)">trade</span> ' + escapeHtml(sc.outlier_ticker || '');
        } else {
          const rs = String(sc.reason || sc.action || '').slice(0, 72);
          if (rs) scanCol += ' <span class="hint">' + escapeHtml(rs) + '</span>';
        }
      }
      const ord = volSurfaceOrderStatusLabel(m.order_status);
      const ordHtml = ord === 'None'
        ? '<span style="color:var(--muted)">None</span>'
        : (ord === 'Open order' ? '<span style="color:#8cb4ff">Open order</span>' : '<span style="color:var(--ok)">Active position</span>');
      const trk = escapeHtml(m.status != null ? String(m.status) : (m.raw_status != null ? String(m.raw_status) : '—'));
      h += '<tr title="' + escapeHtml(m.key || '') + '"><td><strong>' + label + '</strong></td>';
      h += '<td>' + winCol + '</td><td>' + inW + '</td><td>' + tick + '</td>';
      h += '<td>' + scanCol + '</td><td>' + ordHtml + '</td><td><code>' + trk + '</code></td></tr>';
    }
    h += '</tbody></table></div>';
    h += '<h3 style="font-size:0.95rem;margin:0.75rem 0 0.35rem">Recent orders</h3>';
    h += '<div class="table-wrap"><table><thead><tr><th>Time (ET)</th><th>Market</th><th>Event</th><th>Ticker</th><th>Side</th><th>Qty</th><th>¢</th></tr></thead><tbody>';
    for (const ev of (j.recent_order_events || []).slice(0, 40)) {
      h += '<tr><td>' + escapeHtml(utcToEst(ev.at_utc)) + '</td><td><code>' + escapeHtml(ev.market_key || '') + '</code></td>';
      h += '<td>' + escapeHtml(ev.event || '') + '</td><td>' + escapeHtml(ev.ticker || '') + '</td>';
      h += '<td>' + escapeHtml(ev.side || '') + '</td><td>' + (ev.contracts != null ? ev.contracts : '') + '</td><td>' + (ev.price_cents != null ? ev.price_cents : '') + '</td></tr>';
    }
    h += '</tbody></table></div>';
    h += '<h3 style="font-size:0.95rem;margin:0.75rem 0 0.35rem">Trade outcomes</h3>';
    h += '<div class="table-wrap"><table><thead><tr><th>Market</th><th>Ticker</th><th>Status</th><th>Contracts</th><th>Entry¢</th><th>P&amp;L¢</th><th>Note</th></tr></thead><tbody>';
    for (const t of (j.trade_outcomes || []).slice(0, 40)) {
      h += '<tr><td><code>' + escapeHtml(t.market_key || '') + '</code></td><td>' + escapeHtml(t.ticker || '') + '</td>';
      h += '<td>' + escapeHtml(t.status || '') + '</td><td>' + (t.contracts != null ? t.contracts : '') + '</td>';
      h += '<td>' + (t.entry_cents != null ? t.entry_cents : '') + '</td><td>' + (t.pnl_cents != null ? t.pnl_cents : '—') + '</td>';
      h += '<td>' + escapeHtml(t.note || '') + '</td></tr>';
    }
    h += '</tbody></table></div>';
    if (j.panel_db) {
      h += '<p class="hint">Panel DB: <code>' + escapeHtml(j.panel_db) + '</code></p>';
    }
    el.innerHTML = h;
  }).catch((e) => { el.innerHTML = '<pre>' + escapeHtml(String(e)) + '</pre>'; });
}

function loadWeatherSnapshot(el, sid) {
  if (!el) return;
  el.innerHTML = 'Loading…';
  api('/api/strategies/' + sid + '/weather-snapshot').then((j) => {
    if (!j.ok && j.error) {
      el.innerHTML = '<pre class="hint">' + escapeHtml(j.error) + '</pre>';
      return;
    }
    let h = '';
    if (j.generated_at_utc) {
      h += '<p class="hint">Snapshot: ' + escapeHtml(utcToEst(j.generated_at_utc)) + ' ET</p>';
    }
    h += '<h3 style="font-size:0.95rem;margin:0.75rem 0 0.35rem">Next check-ins &amp; when trades can fire</h3>';
    h += '<ol class="hint" style="margin:0 0 1rem 1.1rem;padding:0">';
    (j.next_steps || []).forEach((step) => {
      h += '<li style="margin:0.35rem 0">' + escapeHtml(step) + '</li>';
    });
    h += '</ol>';
    h += '<h3 style="font-size:0.95rem;margin:0.75rem 0 0.35rem">Per city — model vs market (edge = model − mid, percentage points)</h3>';
    for (const c of (j.cities || [])) {
      h += '<div class="overview-tile" style="margin-bottom:0.75rem">';
      h += '<strong>' + escapeHtml(c.city) + '</strong>';
      if (c.timezone) h += ' <code style="font-size:0.7rem">' + escapeHtml(c.timezone) + '</code>';
      h += '<div class="hint" style="margin-top:0.35rem">' + escapeHtml(c.trade_window_hint || '') + '</div>';
      if (c.severe_blackout) {
        h += '<div style="color:var(--bad);font-size:0.8rem">Severe-weather blackout active</div>';
      }
      if (c.error) {
        h += '<div class="hint">' + escapeHtml(c.error) + '</div></div>';
        continue;
      }
      const p = c.projected;
      if (p) {
        h += '<div style="margin-top:0.35rem">Proj. high: <strong>' + p.projected_high + '°F</strong>';
        if (p.is_stale) h += ' <span style="color:var(--bad)">stale forecast</span>';
        h += ' · forecast age: ' + Math.round(p.forecast_age_minutes) + ' min</div>';
      }
      if (c.entry_hours_hint) {
        h += '<div class="hint">' + escapeHtml(c.entry_hours_hint) + '</div>';
      }
      h += '<div class="hint">Target bucket spacing OK: ' + (c.target_bucket_ok ? 'yes' : 'no');
      if (c.target_distance_f != null) {
        h += ' (Δ' + c.target_distance_f + '°F from bucket edges)';
      }
      h += '</div>';
      if (c.best_edge_pct != null) {
        h += '<div>Strongest |edge|: <strong>' + (c.best_edge_pct > 0 ? '+' : '') + c.best_edge_pct + '</strong> pp</div>';
      }
      if (c.actionable_signals && c.actionable_signals.length) {
        h += '<div style="margin-top:0.35rem;color:var(--ok)">Passes all bot filters: ';
        h += c.actionable_signals.map(function (sig) {
          return sig.side.toUpperCase() + ' ' + escapeHtml(sig.ticker) + ' edge ' + sig.edge;
        }).join(' · ');
        h += '</div>';
      } else {
        h += '<div class="hint" style="margin-top:0.35rem">No actionable signal right now (time-to-close, spread, MIN_EDGE, bucket distance, stale).</div>';
      }
      const rows = c.bucket_rows || [];
      if (rows.length) {
        h += '<div class="table-wrap" style="margin-top:0.5rem"><table><thead><tr>';
        h += '<th>Bucket</th><th>Model %</th><th>Mid %</th><th>Edge (pp)</th><th>Spr</th></tr></thead><tbody>';
        for (const r of rows) {
          h += '<tr><td>' + escapeHtml(r.bucket) + '</td><td>' + r.model_pct + '</td><td>' + r.market_pct + '</td>';
          h += '<td>' + (r.edge_pct > 0 ? '+' : '') + r.edge_pct + '</td><td>';
          h += (r.spread != null ? r.spread : '—') + '</td></tr>';
        }
        h += '</tbody></table></div>';
      }
      h += '</div>';
    }
    if (j.constants) {
      const k = j.constants;
      h += '<p class="hint">Bot thresholds: MIN_EDGE ' + k.min_edge + ', max spread ' + k.max_spread_cents;
      h += '¢, min °F from bucket edge ' + k.min_bucket_edge_distance_f + ', new entries when ';
      h += k.entry_hours_min + '–' + k.entry_hours_max + 'h to market close.</p>';
    }
    el.innerHTML = h;
  }).catch((e) => { el.innerHTML = '<pre>' + escapeHtml(String(e)) + '</pre>'; });
}

function loadTable(el, sid, table, limit) {
  if (!el) return;
  api('/api/strategies/' + sid + '/tables/' + table + '?limit=' + (limit || 200)).then((j) => {
    const db = j.db || {};
    const rowList = j.rows || [];
    if (j.sqlite_error) {
      el.innerHTML = '<p class="hint" style="color:var(--bad)">SQLite: ' + escapeHtml(j.sqlite_error) + '</p>' +
        '<p class="hint">Resolved: <code>' + escapeHtml(db.resolved_path || '') + '</code> · exists: ' + !!db.resolved_exists +
        (db.repo_root ? ' · repo: <code>' + escapeHtml(db.repo_root) + '</code>' : '') + '</p>';
      return;
    }
    if (!j.columns || !j.columns.length) {
      let msg = '<p class="hint">No table schema (database missing or empty file).</p>';
      if (!db.resolved_exists) {
        msg += '<p class="hint" style="color:var(--bad)">SQLite file not found at <code>' + escapeHtml(db.resolved_path || db.config_path || '') + '</code> under <code>KALSHI_TRADING_ROOT</code>. Start the bot once so it can create the DB, or fix the path in <code>strategies.yaml</code>.</p>';
      }
      el.innerHTML = msg;
      return;
    }
    let h = '';
    if (!db.resolved_exists) {
      h += '<p class="hint" style="color:var(--bad)">DB file missing at <code>' + escapeHtml(db.resolved_path || '') + '</code>.</p>';
    }
    if (db.resolved_exists && !rowList.length) {
      if (table === 'trades') {
        h += '<p class="hint">No trade rows yet. Rows are added when the weather bot successfully places an order (<code>log_trade_open</code>) and updated on close.</p>';
      } else if (table === 'btc_sessions') {
        h += '<p class="hint">No completed sessions yet. The BTC bot appends a row when each 15m market reaches <strong>close</strong> (not at entry).</p>';
      } else if (table === 'btc_order_events') {
        h += '<p class="hint">No rows yet. After deploy, use the <strong>Order events</strong> tab: a row appears when entry or exit orders are successfully placed (before session close).</p>';
      } else {
        h += '<p class="hint">Table exists but has no rows yet.</p>';
      }
    }
    h += '<div class="table-wrap"><table><thead><tr>';
    h += j.columns.map((c) => '<th>' + escapeHtml(c) + '</th>').join('');
    h += '</tr></thead><tbody>';
    for (const row of rowList) {
      h += '<tr>' + row.map((c, ci) => '<td>' + escapeHtml(formatCell(j.columns[ci], c)) + '</td>').join('') + '</tr>';
    }
    h += '</tbody></table></div>';
    h += '<p class="hint" style="margin-top:0.5rem">';
    if (rowList.length) {
      h += '<button type="button" class="csv-dl-btn">Download CSV (all rows)</button> ';
    }
    h += '<button type="button" class="clear-tbl-btn" style="background:#4d1f1f;color:var(--bad)">Clear all rows</button>';
    h += ' <span class="hint">Table shows newest ' + escapeHtml(String(limit || 200)) + ' rows; CSV is a full export. Times in ET (stored UTC)</span></p>';
    if (db.config_path) {
      h += '<p class="hint">DB: <code>' + escapeHtml(db.resolved_path || db.config_path) + '</code></p>';
    }
    el.innerHTML = h;
    var dlBtn = el.querySelector('.csv-dl-btn');
    if (dlBtn) {
      dlBtn.onclick = function () {
        var prev = dlBtn.textContent;
        dlBtn.disabled = true;
        dlBtn.textContent = 'Preparing…';
        api('/api/strategies/' + sid + '/tables/' + table + '?full=true')
          .then(function (fj) {
            dlBtn.disabled = false;
            dlBtn.textContent = prev;
            if (fj.sqlite_error) {
              alert('CSV export failed: ' + fj.sqlite_error);
              return;
            }
            downloadCsv(fj.columns || [], fj.rows || [], sid + '_' + table);
          })
          .catch(function (e) {
            dlBtn.disabled = false;
            dlBtn.textContent = prev;
            alert('CSV export failed: ' + e);
          });
      };
    }
    var clrBtn = el.querySelector('.clear-tbl-btn');
    if (clrBtn) {
      clrBtn.onclick = function () {
        if (!confirm('Delete ALL rows from "' + table + '" for ' + sid + '? This cannot be undone.')) return;
        api('/api/strategies/' + sid + '/tables/' + table + '/clear', { method: 'POST' })
          .then(function () { loadTable(el, sid, table, limit); })
          .catch(function (e) { alert('Clear failed: ' + e); });
      };
    }
  }).catch((e) => { el.innerHTML = '<pre>' + escapeHtml(String(e)) + '</pre>'; });
}

function wireControls(cardRoot, s) {
  const id = s.id;
  cardRoot.querySelectorAll('button[data-a]').forEach((btn) => {
    btn.onclick = async () => {
      try {
        await api('/api/strategies/' + id + '/' + btn.dataset.a, { method: 'POST' });
        strategies = await api('/api/strategies');
        const cur = strategies.find((x) => x.id === id);
        const b = cardRoot.querySelector('.badge.active, .badge.inactive');
        if (b && cur) {
          b.className = 'badge ' + (cur.status === 'active' ? 'active' : 'inactive');
          b.textContent = cur.status === 'active' ? 'running' : 'stopped';
        }
        if (cur) applyMetricsToCard(cardRoot, cur);
        const logEl = cardRoot.querySelector('[data-role="journal"]');
        if (logEl && s.has_journal) loadLog(logEl, id, s.journal_lines || 400);
      } catch (e) { alert(e); }
    };
  });
}

function loadBtcContracts(cardRoot, sid) {
  const inp = cardRoot.querySelector('[data-btc-contracts-input]');
  const st = cardRoot.querySelector('[data-btc-contracts-status]');
  const hint = cardRoot.querySelector('[data-btc-contracts-hint]');
  if (!inp) return;
  api('/api/strategies/' + sid + '/btc-contracts').then((j) => {
    inp.min = String(j.min != null ? j.min : 1);
    inp.max = String(j.max != null ? j.max : 5000);
    inp.value = String(j.contracts);
    if (hint) {
      hint.textContent = j.from_panel_file
        ? 'Panel override is active (replaces KALSHI_CONTRACTS in .env). Restart the bot after changing.'
        : 'Using .env KALSHI_CONTRACTS until you save a value here.';
    }
    if (st) st.textContent = '';
  }).catch((e) => { if (st) st.textContent = String(e); });
  const btn = cardRoot.querySelector('[data-save-btc-contracts]');
  if (btn) {
    btn.onclick = async () => {
      const n = parseInt(String(inp.value), 10);
      if (!isFinite(n) || n < 1) { alert('Enter a valid contract count'); return; }
      try {
        const j = await api('/api/strategies/' + sid + '/btc-contracts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contracts: n }),
        });
        inp.value = String(j.contracts);
        if (st) st.textContent = 'Saved. Restart the bot to apply.';
        if (hint) hint.textContent = 'Panel override active. Restart BTC 15m.';
      } catch (e) { alert(e); }
    };
  }
}

function buildStrategyPage(s) {
  const id = s.id;
  const isBtc = id === 'btc15m' && s.has_journal && s.sqlite_tables && s.sqlite_tables.includes('btc_sessions');
  const isWeather = id === 'weather';
  const isVolSurface = id === 'vol_surface';
  const weatherTables = isWeather
    ? ((s.sqlite_tables && s.sqlite_tables.length) ? s.sqlite_tables : ['forecasts', 'signals', 'trades', 'errors'])
    : [];
  const div = document.createElement('div');
  div.className = 'page';
  div.dataset.page = id;

  let inner = '<div class="card" data-sid="' + id + '">';
  inner += '<div class="row" style="margin-top:0;align-items:center;gap:0.5rem;flex-wrap:wrap">';
  inner += '<strong>' + (s.title || id) + '</strong> ';
  inner += '<span data-role="mode-badge">' + modeBadgeHtml(s.trading_mode, s.trading_mode_label) + '</span> ';
  inner += badge(s.status) + '</div>';
  inner += '<div data-role="pnl-line" class="hint" style="margin-top:0.35rem">' + (pnlLineHtml(s) || '&nbsp;') + '</div>';
  inner += '<div style="color:#8b9cb3;font-size:0.8rem">' + (s.unit || '') + '</div>';
  inner += '<div class="row">';
  inner += '<button class="primary" data-a="start">Start</button><button data-a="stop">Stop</button><button data-a="restart">Restart</button></div>';

  if (isBtc) {
    inner += '<div class="row" style="margin-top:0.65rem;align-items:center;flex-wrap:wrap;gap:0.5rem">';
    inner += '<label for="btc-c-' + id + '" style="font-size:0.875rem">Contracts per market</label>';
    inner += '<input id="btc-c-' + id + '" type="number" data-btc-contracts-input min="1" max="5000" ';
    inner += 'style="width:5.5rem;padding:0.35rem;border-radius:6px;border:1px solid #2d3a4f;background:#0b0f14;color:inherit" /> ';
    inner += '<button type="button" data-save-btc-contracts>Save</button> ';
    inner += '<span class="hint" data-btc-contracts-status></span></div>';
    inner += '<p class="hint" data-btc-contracts-hint style="margin-top:0.2rem"></p>';
  }

  if (isVolSurface) {
    const volTables = (s.sqlite_tables && s.sqlite_tables.length) ? s.sqlite_tables : ['last_scan', 'order_events', 'trade_outcomes'];
    inner += '<div class="tabs vol-sub" data-vsid="' + id + '">';
    inner += '<button type="button" class="on" data-sub="dash">Dashboard</button>';
    inner += '<button type="button" data-sub="logs">Logs</button>';
    inner += volTables.map((t) => '<button type="button" data-sub="tbl-' + t + '">' + t + '</button>').join('');
    inner += '</div>';
    inner += '<div class="panel on" data-subpanel="dash"><div data-role="vol-dash">Loading…</div></div>';
    inner += '<div class="panel" data-subpanel="logs"><pre data-role="journal">Loading…</pre></div>';
    for (const t of volTables) {
      inner += '<div class="panel" data-subpanel="tbl-' + t + '"><div data-vdata="' + id + '" data-table="' + t + '"></div></div>';
    }
  } else if (isBtc) {
    inner += '<div class="tabs btc-sub" data-btc="' + id + '">';
    inner += '<button type="button" class="on" data-sub="logs">Logs</button>';
    inner += '<button type="button" data-sub="trades">Trade log</button>';
    inner += '<button type="button" data-sub="order-events">Order events</button>';
    inner += '<button type="button" data-sub="hourly">Success by hour (ET)</button></div>';
    inner += '<div class="panel on" data-subpanel="logs"><pre data-role="journal">Loading…</pre></div>';
    inner += '<div class="panel" data-subpanel="trades"><div data-role="btc-table"></div></div>';
    inner += '<div class="panel" data-subpanel="order-events"><div data-role="btc-order-events"></div></div>';
    inner += '<div class="panel" data-subpanel="hourly"><div data-role="btc-hourly"></div></div>';
  } else if (s.has_journal) {
    inner += '<pre data-role="journal">Loading…</pre>';
  }

  if (isWeather && weatherTables.length) {
    inner += '<div class="tabs weather-sub" data-wsid="' + id + '">';
    inner += '<button type="button" class="on" data-sub="edges">Edges &amp; next steps</button>';
    inner += weatherTables.map((t) =>
      '<button type="button" data-sub="tbl-' + t + '">' + t + '</button>').join('');
    inner += '</div>';
    inner += '<div class="panel on" data-subpanel="edges"><div data-role="weather-snapshot">Loading…</div>';
    inner += '<p class="hint"><button type="button" data-refresh-weather>Refresh snapshot</button></p></div>';
    for (const t of weatherTables) {
      inner += '<div class="panel" data-subpanel="tbl-' + t + '"><div data-wdata="' + id + '" data-table="' + t + '"></div></div>';
    }
  } else if (s.sqlite_tables && s.sqlite_tables.length && !isBtc) {
    inner += '<div class="tabs" data-wtabs="' + id + '"></div><div data-wdata="' + id + '"></div>';
  }

  inner += '</div>';
  div.innerHTML = inner;
  wireControls(div.querySelector('.card'), s);
  if (isBtc) {
    loadBtcContracts(div.querySelector('.card'), id);
  }

  if (isVolSurface) {
    const sub = div.querySelector('.vol-sub');
    const panels = div.querySelectorAll('[data-subpanel]');
    function showVolSub(name) {
      sub.querySelectorAll('button').forEach((b) => b.classList.toggle('on', b.dataset.sub === name));
      panels.forEach((p) => p.classList.toggle('on', p.dataset.subpanel === name));
      if (name === 'dash') loadVolSurfaceDashboard(div.querySelector('[data-role="vol-dash"]'), id);
      if (name === 'logs') loadLog(div.querySelector('[data-role="journal"]'), id, s.journal_lines || 500);
      if (name.indexOf('tbl-') === 0) {
        const tbl = name.slice(4);
        const holder = div.querySelector('[data-vdata="' + id + '"][data-table="' + tbl + '"]');
        loadTable(holder, id, tbl, 200);
      }
    }
    sub.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => showVolSub(btn.dataset.sub);
    });
    loadVolSurfaceDashboard(div.querySelector('[data-role="vol-dash"]'), id);
    loadLog(div.querySelector('[data-role="journal"]'), id, s.journal_lines || 500);
  } else if (isBtc) {
    const sub = div.querySelector('.btc-sub');
    const panels = div.querySelectorAll('[data-subpanel]');
    sub.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => {
        sub.querySelectorAll('button').forEach((b) => b.classList.remove('on'));
        btn.classList.add('on');
        const name = btn.dataset.sub;
        panels.forEach((p) => p.classList.toggle('on', p.dataset.subpanel === name));
        if (name === 'logs') loadLog(div.querySelector('[data-role="journal"]'), id, s.journal_lines || 400);
        if (name === 'trades') loadTable(div.querySelector('[data-role="btc-table"]'), id, 'btc_sessions', 250);
        if (name === 'order-events') loadTable(div.querySelector('[data-role="btc-order-events"]'), id, 'btc_order_events', 250);
        if (name === 'hourly') renderBtcHourly(div.querySelector('[data-role="btc-hourly"]'), id);
      };
    });
    loadLog(div.querySelector('[data-role="journal"]'), id, s.journal_lines || 400);
    loadTable(div.querySelector('[data-role="btc-table"]'), id, 'btc_sessions', 250);
  } else if (s.has_journal) {
    loadLog(div.querySelector('[data-role="journal"]'), id, s.journal_lines || 400);
  }

  if (isWeather && weatherTables.length) {
    const snapEl = div.querySelector('[data-role="weather-snapshot"]');
    const sub = div.querySelector('.weather-sub');
    const panels = div.querySelectorAll('[data-subpanel]');
    function showWeatherSub(name) {
      sub.querySelectorAll('button').forEach((b) => b.classList.toggle('on', b.dataset.sub === name));
      panels.forEach((p) => p.classList.toggle('on', p.dataset.subpanel === name));
      if (name === 'edges') loadWeatherSnapshot(snapEl, id);
      if (name.indexOf('tbl-') === 0) {
        const tbl = name.slice(4);
        const holder = div.querySelector('[data-wdata="' + id + '"][data-table="' + tbl + '"]');
        loadTable(holder, id, tbl, 200);
      }
    }
    sub.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => showWeatherSub(btn.dataset.sub);
    });
    const refBtn = div.querySelector('[data-refresh-weather]');
    if (refBtn) refBtn.onclick = () => loadWeatherSnapshot(snapEl, id);
    loadWeatherSnapshot(snapEl, id);
  } else if (s.sqlite_tables && s.sqlite_tables.length && !isBtc) {
    const tabEl = div.querySelector('[data-wtabs="' + id + '"]');
    const dataEl = div.querySelector('[data-wdata="' + id + '"]');
    tabEl.innerHTML = s.sqlite_tables.map((t, i) =>
      '<button type="button" class="' + (i === 0 ? 'on' : '') + '" data-t="' + t + '">' + t + '</button>').join('');
    tabEl.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => {
        tabEl.querySelectorAll('button').forEach((b) => b.classList.remove('on'));
        btn.classList.add('on');
        loadTable(dataEl, id, btn.dataset.t, 200);
      };
    });
    loadTable(dataEl, id, s.sqlite_tables[0], 200);
  }

  return div;
}

function showPage(main, nav, pageId) {
  if (overviewTimer) {
    clearInterval(overviewTimer);
    overviewTimer = null;
  }
  nav.querySelectorAll('button').forEach((x) => x.classList.toggle('on', x.dataset.target === pageId));
  main.querySelectorAll('.page').forEach((p) => p.classList.toggle('on', p.dataset.page === pageId));
  if (pageId === 'overview') {
    const pg = main.querySelector('.page[data-page="overview"]');
    if (pg) {
      loadOverview(pg);
      overviewTimer = setInterval(function () { loadOverview(pg); }, 60000);
    }
  }
  if (pageId === 'deploy') {
    const pg = main.querySelector('.page[data-page="deploy"]');
    if (pg) loadDeployUI(pg);
  }
  if (pageId === 'weather') {
    const pg = main.querySelector('.page[data-page="weather"]');
    const snap = pg && pg.querySelector('[data-role="weather-snapshot"]');
    const subOn = pg && pg.querySelector('.weather-sub button.on');
    if (snap && subOn && subOn.dataset.sub === 'edges') {
      loadWeatherSnapshot(snap, 'weather');
    }
  }
  if (pageId === 'vol_surface') {
    const pg = main.querySelector('.page[data-page="vol_surface"]');
    const dash = pg && pg.querySelector('[data-role="vol-dash"]');
    const subOn = pg && pg.querySelector('.vol-sub button.on');
    if (dash && subOn && subOn.dataset.sub === 'dash') {
      loadVolSurfaceDashboard(dash, 'vol_surface');
    }
  }
}

async function loadDeployUI(container) {
  const root = container.querySelector('[data-deploy-root]');
  if (!root) return;
  const listEl = root.querySelector('[data-deploy-toggles]');
  const outEl = root.querySelector('#deploy-out');
  try {
    const p = await api('/api/deploy/prefs');
    listEl.innerHTML = '';
    (p.strategies || []).forEach((meta) => {
      const sid = meta.id;
      const row = document.createElement('div');
      row.className = 'toggle-row';
      const id = 'rop-' + sid;
      row.innerHTML = '<label for="' + id + '">' + (meta.title || sid) + ' <code>' + sid + '</code></label>' +
        '<input type="checkbox" id="' + id + '" data-sid="' + sid + '" />';
      const cb = row.querySelector('input');
      cb.checked = !!(p.restart_on_pull && p.restart_on_pull[sid]);
      cb.onchange = async () => {
        try {
          await api('/api/deploy/prefs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ restart_on_pull: { [sid]: cb.checked } }),
          });
        } catch (e) { alert(e); cb.checked = !cb.checked; }
      };
      listEl.appendChild(row);
    });
    const unitHint = root.querySelector('[data-panel-unit]');
    if (unitHint) unitHint.textContent = p.control_panel_unit || '';
    outEl.textContent = '';
  } catch (e) {
    outEl.textContent = String(e);
  }
}

function buildDeployPage() {
  const div = document.createElement('div');
  div.className = 'page';
  div.dataset.page = 'deploy';
  div.innerHTML =
    '<div class="card" data-deploy-root>' +
    '<strong>Deploy</strong>' +
    '<p class="hint">Run <code>git pull</code> in the repo on this machine (<code>KALSHI_TRADING_ROOT</code>). Per strategy, <strong>Restart on pull</strong> runs <code>systemctl --user restart</code> for that unit after a pull so new code loads (stopped services will start). If off, the unit is left as-is until you use Start/Restart on the strategy tab.</p>' +
    '<p class="hint">After a <strong>successful</strong> pull, the control panel always restarts itself (~2s delay) so UI/API code updates load. Unit: <code data-panel-unit></code>.</p>' +
    '<div data-deploy-toggles></div>' +
    '<div class="row" style="margin-top:1rem">' +
    '<button type="button" class="primary" data-git-pull>Git pull &amp; update</button></div>' +
    '<pre id="deploy-out" class="hint"></pre></div>';
  div.querySelector('[data-git-pull]').onclick = async () => {
    const out = div.querySelector('#deploy-out');
    out.textContent = 'Running…';
    try {
      const j = await api('/api/deploy/git-pull', { method: 'POST' });
      out.textContent = JSON.stringify(j, null, 2);
      strategies = await api('/api/strategies');
      document.querySelectorAll('.page[data-page]').forEach((pg) => {
        if (pg.dataset.page === 'deploy' || !strategies.find((x) => x.id === pg.dataset.page)) return;
        const card = pg.querySelector('.card[data-sid]');
        if (!card) return;
        const sid = card.dataset.sid;
        const cur = strategies.find((x) => x.id === sid);
        const b = card.querySelector('.badge.active, .badge.inactive');
        if (b && cur) {
          b.className = 'badge ' + (cur.status === 'active' ? 'active' : 'inactive');
          b.textContent = cur.status === 'active' ? 'running' : 'stopped';
        }
        if (cur) applyMetricsToCard(card, cur);
      });
    } catch (e) {
      out.textContent = String(e);
    }
  };
  return div;
}

async function init() {
  strategies = await api('/api/strategies');
  const nav = document.getElementById('nav-main');
  const main = document.getElementById('main');
  nav.innerHTML = '';
  main.innerHTML = '';

  const overviewBtn = document.createElement('button');
  overviewBtn.type = 'button';
  overviewBtn.textContent = 'Overview';
  overviewBtn.dataset.target = 'overview';
  overviewBtn.onclick = () => showPage(main, nav, 'overview');
  nav.appendChild(overviewBtn);

  const deployBtn = document.createElement('button');
  deployBtn.type = 'button';
  deployBtn.textContent = 'Deploy';
  deployBtn.dataset.target = 'deploy';
  deployBtn.onclick = () => showPage(main, nav, 'deploy');
  nav.appendChild(deployBtn);

  strategies.forEach((s) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = s.title || s.id;
    b.dataset.target = s.id;
    b.onclick = () => showPage(main, nav, s.id);
    nav.appendChild(b);
  });

  main.appendChild(buildOverviewPage());
  const deployPage = buildDeployPage();
  main.appendChild(deployPage);
  loadDeployUI(deployPage);

  strategies.forEach((s) => {
    main.appendChild(buildStrategyPage(s));
  });

  overviewBtn.classList.add('on');
  showPage(main, nav, 'overview');
}

init();
</script>
